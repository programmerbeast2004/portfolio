<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="a1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="a2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="v1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
    <linearGradient id="v2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aaaaaa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- A left leg -->
  <line x1="4"  y1="27" x2="10" y2="5" stroke="url(#a1)" stroke-width="2" stroke-linecap="round"/>
  <!-- A right leg -->
  <line x1="10" y1="5"  x2="16" y2="27" stroke="url(#a2)" stroke-width="2" stroke-linecap="round"/>

  <!-- V left leg -->
  <line x1="16" y1="5"  x2="22" y2="27" stroke="url(#v1)" stroke-width="2" stroke-linecap="round"/>
  <!-- V right leg -->
  <line x1="28" y1="5"  x2="22" y2="27" stroke="url(#v2)" stroke-width="2" stroke-linecap="round"/>
</svg>
